<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeet Pickup Tracker</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; color: #333; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h1 { margin-top: 0; color: #8b0000; font-size: 24px; border-bottom: 2px solid #f4f7f6; padding-bottom: 10px; }
        ul { list-style: none; padding: 0; margin: 20px 0; }
        li { padding: 10px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; font-size: 16px; }
        .total-box { background: #8b0000; color: white; padding: 15px; border-radius: 8px; text-align: center; font-size: 20px; font-weight: bold; margin-top: 20px; }
        .no-data { color: #888; font-style: italic; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1>Skeet's Weekly Log</h1>
    <ul id="pickup-list">
        <li class="no-data">Loading live tracking data...</li>
    </ul>
    <div class="total-box">
        Weekly Total: $<span id="grand-total">0</span>
    </div>
</div>

<script>
    // PASTE YOUR GOOGLE WEB APP URL HERE
    const API_URL = "https://script.google.com/macros/s/AKfycbwsjope1juu7A7YKdZX4tqaTfddlCFQgxiHAUrW2TVNfh2BT6OLCWpVV83JrBv39Bg8/exec";

        async function loadTrackerData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const listElement = document.getElementById("pickup-list");
                const totalElement = document.getElementById("grand-total");
                
                totalElement.innerText = data.total;
                listElement.innerHTML = "";
                
                if (data.items.length === 0) {
                    listElement.innerHTML = '<li class="no-data">No active items tracked for this week.</li>';
                    return;
                }
                
                data.items.forEach(item => {
                    const li = document.createElement("li");
                    // Appends a small badge if it's Food vs a Pickup
                    const badge = item.category === "Food" ? "🍎 " : "🚗 ";
                    li.innerHTML = `<span><strong>${badge}</strong> ${item.detail}</span> <span>$${item.price}</span>`;
                    listElement.appendChild(li);
                });
                
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById("pickup-list").innerHTML = '<li class="no-data" style="color: red;">Failed to load data.</li>';
            }
        }

        loadTrackerData();
</script>
</body>
</html>
