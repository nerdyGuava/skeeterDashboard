<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:image" content="https://nerdyguava.github.io/skeeterDashboard/skeetMeta.png">

    <title>Skeet's Weekly Tracker</title>
    <style>
        :root {
            --primary: #2c5e43; /* Friendly Forest Green */
            --accent: #e8f0ec;  /* Light Sage Accent */
            --text: #2d3748;
            --bg: #f3f7f5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0;
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .card { 
            background: white; 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(44, 94, 67, 0.08); 
            width: 100%; 
            max-width: 420px; 
            box-sizing: border-box;
            text-align: center;
        }

        /* Container to crop and style Skeet's picture beautifully */
        .img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 16px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        h1 { 
            margin: 0 0 4px 0; 
            color: var(--primary); 
            font-size: 24px; 
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #718096;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        ul { 
            list-style: none; 
            padding: 0; 
            margin: 20px 0; 
            text-align: left;
        }

        li { 
            padding: 12px 8px; 
            border-bottom: 1px solid #edf2f7; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 15px; 
        }

        li:last-child {
            border-bottom: none;
        }

        .item-details {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .price-tag {
            font-weight: 600;
            color: var(--primary);
            background-color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
        }

        .total-box { 
            background: var(--primary); 
            color: white; 
            padding: 16px; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 20px; 
            font-weight: bold; 
            margin-top: 24px;
            box-shadow: 0 4px 12px rgba(44, 94, 67, 0.2);
        }

        .no-data { 
            color: #a0aec0; 
            font-style: italic; 
            text-align: center; 
            padding: 30px 0; 
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Skeet's Profile Picture -->
    <div class="img-container">
        <img src="skeet.png" alt="Skeeter looking professional">
    </div>

    <h1>Skeet's Tab</h1>
    <div class="subtitle">Live Weekly Log</div>
    
    <ul id="pickup-list">
        <li class="no-data">Loading tracking details...</li>
    </ul>
    
    <div class="total-box">
        Balance Due: $<span id="grand-total">-</span>
    </div>

    <a id="venmo-button" href="#" target="_blank" style="display: none; background: #008CFF; color: white; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,140,255,0.2);">
        Pay with Venmo
    </a>
</div>

<script>
    // Remember to paste your Google Web App URL deployment link here!
    const API_URL = "https://script.google.com/macros/s/AKfycbwsjope1juu7A7YKdZX4tqaTfddlCFQgxiHAUrW2TVNfh2BT6OLCWpVV83JrBv39Bg8/exec";

    async function loadTrackerData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            const listElement = document.getElementById("pickup-list");
            const totalElement = document.getElementById("grand-total");
            const venmoBtn = document.getElementById("venmo-button");
            
            totalElement.innerText = data.total;
            listElement.innerHTML = "";

            const VENMO_USER = 'reeceracer'

            // Update Venmo URL with the live dynamic total
            if (data.total > 0) {
                venmoBtn.href = `https://venmo.com/?txn=pay&recipients=${VENMO_USER}&amount=${data.total}&note=Skeet%20Pickups`;
                venmoBtn.style.display = "block"; // Show the button if balance > 0
            } else {
                venmoBtn.style.display = "none";  // Hide if balance is 0
            }
            
            if (data.items.length === 0) {
                listElement.innerHTML = '<li class="no-data">✨ All clear! No items checked for this week.</li>';
                return;
            }
            
            data.items.forEach(item => {
                const li = document.createElement("li");
                
                // Determine the badge based on category and detail type
                let badge = "🚗 "; // Default for AM/PM Pickups
                
                if (item.category === "Food") {
                    badge = "🍎 ";
                } else if (item.detail.includes("Skeet Came")) {
                    badge = "🏠 ";
                }
                                
                li.innerHTML = `
                    <div class="item-details">
                        <span>${badge}</span>
                        <span>${item.detail}</span>
                    </div>
                    <span class="price-tag">$${item.price}</span>
                `;
                listElement.appendChild(li);
            });
            
        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById("pickup-list").innerHTML = '<li class="no-data" style="color: #e53e3e;">⚠️ Failed to load live data.</li>';
        }
    }

    loadTrackerData();
</script>
</body>
</html>
